<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Rookie Draft Guide — The Marker System</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c0f;--surface:#111418;--surface2:#181c22;--border:#1e2530;
  --text:#e8edf3;--muted:#5a6478;--accent:#00c2ff;--gold:#f5c842;
  --red:#ff4655;--green:#00e88a;--orange:#ff8c42;
  --pos-qb:#7b61ff;--pos-rb:#00e88a;--pos-wr:#00c2ff;--pos-te:#ff8c42;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
header{position:sticky;top:0;z-index:100;background:rgba(10,12,15,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:64px;}
.logo{display:flex;align-items:baseline;gap:12px;}
.logo-title{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;color:var(--accent);line-height:1;}
.logo-sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;}
.year-badge{font-family:'Bebas Neue',cursive;font-size:22px;color:var(--gold);letter-spacing:2px;}
.hero{position:relative;padding:60px 32px 48px;background:linear-gradient(180deg,rgba(0,194,255,.04) 0%,transparent 100%);border-bottom:1px solid var(--border);overflow:hidden;}
.hero::before{content:'2026';position:absolute;right:-20px;top:-20px;font-family:'Bebas Neue',cursive;font-size:220px;color:rgba(0,194,255,.03);line-height:1;pointer-events:none;user-select:none;}
.hero h1{font-family:'Bebas Neue',cursive;font-size:clamp(42px,6vw,80px);letter-spacing:4px;line-height:.95;margin-bottom:16px;}
.hero h1 span{color:var(--accent);}
.hero-desc{font-size:15px;color:var(--muted);max-width:560px;line-height:1.7;margin-bottom:32px;}
.stat-row{display:flex;gap:32px;flex-wrap:wrap;}
.stat-pill{display:flex;flex-direction:column;gap:2px;}
.stat-pill .val{font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:2px;line-height:1;}
.stat-pill .lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.controls{padding:20px 32px;display:flex;gap:12px;align-items:center;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:64px;z-index:90;}
.filter-group{display:flex;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px;}
.filter-btn{background:none;border:none;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:6px 14px;border-radius:4px;cursor:pointer;transition:all .15s;}
.filter-btn:hover{color:var(--text);}
.filter-btn.active{color:var(--bg);background:var(--accent);}
.filter-btn.active[data-pos="QB"]{background:var(--pos-qb);}
.filter-btn.active[data-pos="RB"]{background:var(--pos-rb);color:var(--bg);}
.filter-btn.active[data-pos="WR"]{background:var(--pos-wr);color:var(--bg);}
.filter-btn.active[data-pos="TE"]{background:var(--pos-te);color:var(--bg);}
.search-box{flex:1;min-width:180px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 14px;outline:none;transition:border-color .15s;}
.search-box:focus{border-color:var(--accent);}
.search-box::placeholder{color:var(--muted);}
.sort-select{background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:8px 12px;outline:none;cursor:pointer;}
.view-toggle{display:flex;gap:4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:3px;}
.view-btn{background:none;border:none;color:var(--muted);padding:6px 10px;border-radius:4px;cursor:pointer;transition:all .15s;font-size:14px;}
.view-btn.active{background:var(--accent);color:var(--bg);}
.main{padding:24px 32px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;}
.player-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .2s;position:relative;animation:fadeIn .3s ease both;}
.player-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--pos-color,var(--accent));}
.player-card:hover{border-color:var(--pos-color,var(--accent));transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4);}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-avatar{width:64px;height:64px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--pos-color,var(--accent));background:var(--surface2);}
.card-avatar img{width:100%;height:100%;object-fit:cover;object-position:center 20%;}
.card-avatar-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:20px;color:var(--muted);}
.card-name-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.card-body{padding:18px 20px 20px;}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.card-rank{font-family:'Bebas Neue',cursive;font-size:13px;color:var(--muted);letter-spacing:1px;}
.card-pos-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;letter-spacing:2px;padding:3px 8px;border-radius:3px;}
.card-name{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px;line-height:1;margin-bottom:3px;}
.card-school{font-size:11px;color:var(--muted);font-weight:300;}
.card-school span{color:var(--text);opacity:.5;}
.grade-bar-wrap{margin-bottom:12px;}
.grade-bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.grade-bar-label span:first-child{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);}
.grade-val{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1px;line-height:1;}
.grade-bar-track{height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.grade-bar-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.card-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.metric-item{text-align:center;}
.metric-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;display:block;margin-bottom:2px;}
.metric-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.marker-dots{display:flex;gap:3px;flex-wrap:wrap;margin-top:10px;}
.marker-dot{width:7px;height:7px;border-radius:50%;}
.marker-dot.hit{opacity:.9;}
.marker-dot.miss{background:var(--border)!important;opacity:1;}
/* TABLE */
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:12px;background:var(--surface);}
table{width:100%;border-collapse:collapse;font-size:13px;}
thead th{background:var(--surface2);padding:12px 16px;text-align:left;font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none;transition:color .15s;}
thead th:hover{color:var(--accent);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;animation:fadeIn .2s ease both;cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}
td{padding:12px 16px;white-space:nowrap;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;padding:24px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:720px;max-height:92vh;overflow-y:auto;transform:scale(.95);transition:transform .2s;position:relative;}
.modal-overlay.open .modal{transform:scale(1);}
.modal-pos-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;letter-spacing:2px;padding:4px 10px;border-radius:4px;display:inline-block;margin-bottom:8px;}
.modal-name{font-family:'Bebas Neue',cursive;font-size:44px;letter-spacing:2px;line-height:1;margin-bottom:4px;}
.modal-school{font-size:13px;color:rgba(232,237,243,.6);}
.modal-grade-row{display:flex;gap:28px;flex-wrap:wrap;padding:20px 28px;border-bottom:1px solid var(--border);}
.modal-grade-item .val{font-family:'Bebas Neue',cursive;font-size:38px;line-height:1;letter-spacing:1px;}
.modal-grade-item .lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-top:2px;}
.modal-body{padding:20px 28px 28px;}
.modal-section{margin-bottom:24px;}
.modal-section-title{font-family:'IBM Plex Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
/* MARKER CHECKLIST */
.marker-checklist{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.marker-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;background:var(--bg);border:1px solid var(--border);transition:border-color .1s;}
.marker-item.hit{border-color:rgba(0,232,138,.25);background:rgba(0,232,138,.04);}
.marker-item.miss{opacity:.6;}
.marker-icon{font-size:13px;flex-shrink:0;width:18px;text-align:center;}
.marker-text{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);line-height:1.3;}
.marker-item.hit .marker-text{color:var(--text);}
/* MINI BARS */
.mini-bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.mini-bar-lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);width:90px;flex-shrink:0;text-transform:uppercase;letter-spacing:1px;}
.mini-bar-track{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.mini-bar-fill{height:100%;border-radius:3px;transition:width .5s ease;}
.mini-bar-val{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;width:48px;text-align:right;flex-shrink:0;}
/* MODAL STATS GRID */
.modal-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;}
.modal-stat-item{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.modal-stat-val{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:15px;margin-bottom:3px;color:var(--text);}
.modal-stat-lbl{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
.close-btn{position:fixed;top:36px;right:36px;background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;color:var(--muted);font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;z-index:10;}
.close-btn:hover{color:var(--text);border-color:var(--text);}
.results-meta{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);padding:12px 0;display:flex;justify-content:space-between;align-items:center;}
.empty-state{text-align:center;padding:80px 24px;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:13px;}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.3;}
.c-qb{color:var(--pos-qb);}.c-rb{color:var(--pos-rb);}.c-wr{color:var(--pos-wr);}.c-te{color:var(--pos-te);}
.c-gold{color:var(--gold);}.c-green{color:var(--green);}.c-red{color:var(--red);}.c-accent{color:var(--accent);}
.bg-qb{background:color-mix(in srgb,var(--pos-qb) 15%,transparent);color:var(--pos-qb);border:1px solid color-mix(in srgb,var(--pos-qb) 30%,transparent);}
.bg-rb{background:color-mix(in srgb,var(--pos-rb) 15%,transparent);color:var(--pos-rb);border:1px solid color-mix(in srgb,var(--pos-rb) 30%,transparent);}
.bg-wr{background:color-mix(in srgb,var(--pos-wr) 15%,transparent);color:var(--pos-wr);border:1px solid color-mix(in srgb,var(--pos-wr) 30%,transparent);}
.bg-te{background:color-mix(in srgb,var(--pos-te) 15%,transparent);color:var(--pos-te);border:1px solid color-mix(in srgb,var(--pos-te) 30%,transparent);}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}
@media(max-width:640px){header,.controls,.main{padding-left:16px;padding-right:16px;}.hero{padding:40px 16px 32px;}.cards-grid{grid-template-columns:1fr;}.modal-body,.modal-headshot-info{padding:16px;}.modal-name{font-size:32px;}.marker-checklist{grid-template-columns:1fr;}}
</style>
</head>

</div>

// ---- HELPERS ----
function posColor(pos){return POS_COLORS[pos]||'#00c2ff';}
function fmt(v,d=1){if(v==null||isNaN(v))return'—';return parseFloat(v).toFixed(d);}
function fmtPct(v){if(v==null||isNaN(v))return'—';return(v*100).toFixed(1)+'%';}
function fmtAge(v){if(!v||isNaN(v))return'—';const yr=Math.floor(v);const mo=Math.round((v-yr)*12);return yr+'y '+mo+'m';}
function gradeColor(g){if(!g)return'var(--muted)';if(g>=80)return'var(--green)';if(g>=60)return'var(--gold)';if(g>=40)return'var(--orange)';return'var(--red)';}
function hshotSrc(p){if(p.cfr_id)return HEADSHOT_BASE+p.cfr_id+'.jpeg';return null;}
function imgEl(src,cls,alt){return src?'<img src="'+src+'" class="'+cls+'" alt="'+alt+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">'  :'<div style="display:none"></div>';}

let currentPos='ALL', currentSort='rank', searchQuery='', viewMode='cards';

function dynastySort(p) {
  const pos = p.pos;
  const round = p.round;
  const overall = p.overall;
  const grade = p.grade || 0;

  if (round === 8)                                          return grade * 0.5;
  if (pos === 'QB' && round === 1)                          return grade * 1.05;
  if (pos === 'QB' && round > 1)                            return grade * 0.85;
  if (pos === 'TE' && overall != null && overall <= 15)     return grade * 0.97;
  if (pos === 'TE' && overall != null && overall > 15 && round != null && round <= 2) return grade * 0.9;
  if (pos === 'TE' && round === 3)                          return grade * 0.85;
  if (pos === 'WR' && overall != null && overall <= 10)     return grade * 1.05;
  if (pos === 'WR' && round === 3)                          return grade * 0.9;
  if ((pos === 'RB' && round != null && round > 4) ||
      ((pos === 'WR' || pos === 'TE') && round != null && round > 3)) return grade * 0.85;
  return grade;
}

function getFiltered(){
  return PLAYERS.filter(p=>{
    if(currentPos!=='ALL'&&p.pos!==currentPos)return false;
    if(searchQuery){const q=searchQuery.toLowerCase();if(!p.name.toLowerCase().includes(q)&&!p.school.toLowerCase().includes(q))return false;}
    return true;
  }).sort((a,b)=>{
    switch(currentSort){
      case'grade':return(b.grade||0)-(a.grade||0);
      case'markers':return(b.markers||0)-(a.markers||0);
      case'age':return(a.age||99)-(b.age||99);
      case'name':return a.name.localeCompare(b.name);
      default:
        return dynastySort(b)-dynastySort(a);
    }
  });
}

function renderHeroStats(){
  const ranked=PLAYERS.filter(p=>p.rank!==999);
  const byPos={};
  PLAYERS.forEach(p=>{byPos[p.pos]=(byPos[p.pos]||0)+1;});
  const avg=ranked.filter(p=>p.grade).reduce((s,p)=>s+p.grade,0)/ranked.filter(p=>p.grade).length;
  document.getElementById('heroStats').innerHTML=
    '<div class="stat-pill"><div class="val c-accent">'+PLAYERS.length+'</div><div class="lbl">Players Evaluated</div></div>'+
    '<div class="stat-pill"><div class="val c-qb">'+(byPos.QB||0)+'</div><div class="lbl">Quarterbacks</div></div>'+
    '<div class="stat-pill"><div class="val c-rb">'+(byPos.RB||0)+'</div><div class="lbl">Running Backs</div></div>'+
    '<div class="stat-pill"><div class="val c-wr">'+(byPos.WR||0)+'</div><div class="lbl">Wide Receivers</div></div>'+
    '<div class="stat-pill"><div class="val c-te">'+(byPos.TE||0)+'</div><div class="lbl">Tight Ends</div></div>'+
    '<div class="stat-pill"><div class="val c-gold">'+fmt(avg,1)+'</div><div class="lbl">Avg Grade (Ranked)</div></div>';
}

// Dynamic rank label based on current sort
function rankLabel(p, sortedList) {
  const pos = sortedList.indexOf(p) + 1;
  switch(currentSort) {
    case 'grade':   return '#'+pos+' BY GRADE';
    case 'markers': return '#'+pos+' BY MARKERS';
    case 'age':     return '#'+pos+' BY AGE';
    case 'name':    return p.pos;
    default:        return '#'+pos+' OVERALL';
  }
}

function cardMetrics(p){
  if(p.pos==='QB')return[
    {v:p.careerCMP?fmtPct(p.careerCMP):'—', l:'Career CMP%'},
    {v:fmt(p.careerYPA,2),                   l:'Career YPA'},
    {v:fmt(p.bestPPG,1),                     l:'Best PPG'}
  ];
  if(p.pos==='RB')return[
    {v:fmt(p.yptp,1),                        l:'YPTP'},
    {v:p.bestRec!=null?p.bestRec:'—',        l:'Best Rec'},
    {v:fmt(p.bestPPG,1),                     l:'Best PPG'}
  ];
  if(p.pos==='WR')return[
    {v:p.boy30!=null?fmt(p.boy30,0)+'y':'—', l:'BOA30'},
    {v:p.bestYPTPA?fmt(p.bestYPTPA,3):'—',  l:'Best YPTPA'},
    {v:fmt(p.bestPPG,1),                     l:'Best PPG'}
  ];
  // TE
  return[
    {v:p.boa20!=null?fmt(p.boa20,1)+'y':'—', l:'BOA20'},
    {v:p.bestYPTPA?fmt(p.bestYPTPA,3):'—',  l:'Best YPTPA'},
    {v:fmt(p.bestPPG,1),                     l:'Best PPG'}
  ];
}

    'Career YPA ≥ 8.2':               v(p.careerYPA,2),
    'Career PTD ≥ 75 & TDPG ≥ 2 (< 6yr)': (p.careerPTD!=null?p.careerPTD:'-')+' TD / '+(p.careerTDPG!=null?v(p.careerTDPG,2):'-')+' TDPG',
    'Career INT ≤ 25 & INTPG ≤ 0.5 (< 6yr)': (p.careerINT!=null?p.careerINT:'-')+' INT / '+(p.careerINTPG!=null?v(p.careerINTPG,2):'-')+' INTPG',
    'Career RuYPG ≥ 20':              v(p.careerRuYPG,1)+' YPG',
    'Best PYd ≥ 3500':                p.bestPYd!=null?p.bestPYd+' Yds':'—',
    'Best PTD ≥ 30':                  p.bestPTD!=null?p.bestPTD+' TD':'—',
    'Best INT ≤ 7':                   p.bestINT!=null?p.bestINT+' INT':'—',
    'Best CMP% ≥ 67%':                pct(p.bestCMP),
    'Best RuYd ≥ 150':                p.bestRuYd!=null?p.bestRuYd+' Yds':'—',
    'Last PPG ≥ 25':                  v(p.lastPPG,1)+' PPG',
    'Best PPG ≥ 25':                  v(p.bestPPG,1)+' PPG',
    'Height ≥ 76"':                   p.ht!=null?Math.floor(p.ht/12)+"'"+(p.ht%12)+'"':'—',
    'BMI ≥ 28':                       v(p.bmi,2),
    // RB
    'Age < 23':                       p.age!=null?fmtAge(p.age):'—',
    'Round ≤ 2':                      p.round!=null?'Rd '+p.round:'—',
    'Career YPTP ≥ 1.25':             v(p.yptp,3),
    'Best Receptions ≥ 25':           p.bestRec!=null?p.bestRec+' Rec':'—',
    'Best Total Yards ≥ 1000':        p.bestTotalYds!=null?p.bestTotalYds+' Yds':'—',
    'Last PPG ≥ 20':                  v(p.lastPPG,1)+' PPG',
    'Best PPG ≥ 25':                  v(p.bestPPG,1)+' PPG',
    'BMI > 29.97':                    v(p.bmi,2),
    'Weight > 200 lbs':               p.wt!=null?p.wt+' lbs':'—',
    '40-Yard Dash ≤ 4.55s':          p.dash!=null?p.dash+'s':'—',
    'Speed Score ≥ 100':              v(p.wass,1),
    'Burst Score ≥ 120':              v(p.burst,1),
    // WR
    'Age ≤ 22':                       p.age!=null?fmtAge(p.age):'—',
    'BOY20 ≤ 2':                      p.boy20!=null?'Yr '+p.boy20:'—',
    'BOY30 ≤ 3':                      p.boy30!=null?'Yr '+p.boy30:'—',
    'Last YPTPA ≥ 2.5':               v(p.lastYPTPA,3),
    'Best YPTPA ≥ 2.85':              v(p.bestYPTPA,3),
    'Best MS Yards ≥ 35%':            p.bestMSYards!=null?(p.bestMSYards*100).toFixed(1)+'%':'—',
    'Last PPG ≥ 20':                  v(p.lastPPG,1)+' PPG',
    'Best PPG ≥ 20':                  v(p.bestPPG,1)+' PPG',
    'BMI ≥ 27':                       v(p.bmi,2),
    'Height ≥ 72"':                   p.ht!=null?Math.floor(p.ht/12)+"'"+(p.ht%12)+'"':'—',
    // TE
    'Round ≤ 3':                      p.round!=null?'Rd '+p.round:'—',
    'BOY15 ≤ 2':                      p.boy15!=null?'Yr '+p.boy15:'—',
    'Career YPG ≥ 13':                v(p.careerYPG,1)+' YPG',
    'Last YPTPA ≥ 1.5':               v(p.lastYPTPA,3),
    'Best YPTPA ≥ 1.75':              v(p.bestYPTPA,3),
    'Best MS Yards ≥ 20%':            p.bestMSYards!=null?(p.bestMSYards*100).toFixed(1)+'%':'—',
    'Last PPG ≥ 11':                  v(p.lastPPG,1)+' PPG',
    'Best PPG ≥ 13':                  v(p.bestPPG,1)+' PPG',
    'Weight ≥ 250 lbs':               p.wt!=null?p.wt+' lbs':'—',
    'Height ≥ 76"':                   p.ht!=null?Math.floor(p.ht/12)+"'"+(p.ht%12)+'"':'—',
  };
  return map[markerLabel] || '—';
}

function statSquare(val, lbl, highlight) {
  const color = highlight ? 'color:'+highlight+';' : '';
  return '<div class="modal-stat-item"><div class="modal-stat-val" style="'+color+'">'+val+'</div><div class="modal-stat-lbl">'+lbl+'</div></div>';
}

function posStats(p, col) {
  if(p.pos==='QB') return [
    statSquare(p.careerCMP?fmtPct(p.careerCMP):'—','Career CMP%'),
    statSquare(fmt(p.careerYPA,2),'Career YPA'),
    statSquare(p.careerPYd!=null?p.careerPYd:'—','Career PYds'),
    statSquare(p.careerPTD!=null?p.careerPTD:'—','Career PTD'),
    statSquare(p.careerINT!=null?p.careerINT:'—','Career INT'),
    statSquare(fmt(p.careerRuYPG,1),'Ru YPG'),
    statSquare(p.bestPYd!=null?p.bestPYd:'—','Best PYds'),
    statSquare(p.bestPTD!=null?p.bestPTD:'—','Best PTD'),
    statSquare(fmt(p.lastPPG,1),'Last PPG'),
    statSquare(fmt(p.bestPPG,1),'Best PPG',col),
  ].join('');
  if(p.pos==='RB') return [
    statSquare(fmt(p.ypc,2),'YPC'),
    statSquare(fmt(p.yptp,3),'YPTP'),
    statSquare(p.bestRec!=null?p.bestRec:'—','Best Rec'),
    statSquare(p.bestTotalYds!=null?p.bestTotalYds:'—','Best Yds'),
    statSquare(fmt(p.lastPPG,1),'Last PPG'),
    statSquare(fmt(p.bestPPG,1),'Best PPG',col),
  ].join('');
  if(p.pos==='WR') return [
    statSquare(p.boy20!=null?'Yr '+p.boy20:'—','BOY20'),
    statSquare(p.boy30!=null?'Yr '+p.boy30:'—','BOY30'),
    statSquare(p.lastYPTPA?fmt(p.lastYPTPA,3):'—','Last YPTPA'),
    statSquare(p.bestYPTPA?fmt(p.bestYPTPA,3):'—','Best YPTPA'),
    statSquare(p.bestMSYards!=null?(p.bestMSYards*100).toFixed(1)+'%':'—','Best MS Yds'),
    statSquare(fmt(p.lastPPG,1),'Last PPG'),
    statSquare(fmt(p.bestPPG,1),'Best PPG',col),
  ].join('');
  // TE
  return [
    statSquare(p.boy15!=null?'Yr '+p.boy15:'—','BOY15'),
    statSquare(p.boy20!=null?'Yr '+p.boy20:'—','BOY20'),
    statSquare(p.lastYPTPA?fmt(p.lastYPTPA,3):'—','Last YPTPA'),
    statSquare(p.bestYPTPA?fmt(p.bestYPTPA,3):'—','Best YPTPA'),
    statSquare(p.bestMSYards!=null?(p.bestMSYards*100).toFixed(1)+'%':'—','Best MS Yds'),
    statSquare(p.careerYPG?fmt(p.careerYPG,1):'—','Career YPG'),
    statSquare(fmt(p.lastPPG,1),'Last PPG'),
    statSquare(fmt(p.bestPPG,1),'Best PPG',col),
  ].join('');
}

function renderCards(){
  const list=getFiltered();
  const container=document.getElementById('cardsContainer');
  if(!list.length){container.innerHTML='';document.getElementById('emptyState').style.display='block';return;}
  document.getElementById('emptyState').style.display='none';
  let html='';
  list.forEach(p=>{
    const col=posColor(p.pos);const g=p.grade||0;
    const mx=POS_MAX[p.pos]||14;const mk=p.markers||0;
    const src=hshotSrc(p);
    const rl=rankLabel(p,list);
    const metrics=cardMetrics(p).map(m=>'<div class="metric-item"><span class="metric-val">'+m.v+'</span><span class="metric-lbl">'+m.l+'</span></div>').join('');
    let dots='';
    for(let i=0;i<mx;i++)dots+='<div class="marker-dot '+(i<mk?'hit':'miss')+'" style="background:'+(i<mk?col:'')+'"></div>';
    const idx=PLAYERS.indexOf(p);
    html+='<div class="player-card" style="--pos-color:'+col+'" onclick="openModal('+idx+')">';
    html+='<div class="card-body">';
    html+='<div class="card-header"><div class="card-rank">'+rl+'</div><div class="card-pos-badge bg-'+p.pos.toLowerCase()+'">'+p.pos+'</div></div>';
    html+='<div class="card-name-row">';
    html+='<div class="card-avatar" style="--pos-color:'+col+'">';
    if(src)html+='<img src="'+src+'" alt="'+p.name+'" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">';
    html+='<div class="card-avatar-fallback" style="'+(src?'display:none':'')+'">'+p.pos+'</div>';
    html+='</div>';
    html+='<div><div class="card-name">'+p.name+'</div><div class="card-school">'+p.school+' <span>· '+p.conf+'</span></div></div>';
    html+='</div>';
    html+='<div class="grade-bar-wrap"><div class="grade-bar-label"><span>Final Grade</span><span class="grade-val" style="color:'+gradeColor(g)+'">'+(g?fmt(g,1):'—')+'</span></div><div class="grade-bar-track"><div class="grade-bar-fill" style="width:'+g+'%;background:'+gradeColor(g)+'"></div></div></div>';
    html+='<div style="display:flex;justify-content:space-between;align-items:flex-end">';
    html+='<div><div style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:5px">Markers '+mk+'/'+mx+'</div><div class="marker-dots">'+dots+'</div></div>';
    html+='<div style="text-align:right"><div style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:3px">Age</div><div style="font-family:\'Bebas Neue\',cursive;font-size:18px;letter-spacing:1px">'+fmtAge(p.age)+'</div></div>';
    html+='</div>';
    html+='<div class="card-metrics">'+metrics+'</div>';
    html+='</div></div>';
  });
  container.innerHTML=html;
  document.getElementById('resultsCount').textContent=list.length+' player'+(list.length!==1?'s':'')+' shown';
}

function renderTable(){
  const list=getFiltered();
  if(!list.length){document.getElementById('tableBody').innerHTML='';document.getElementById('emptyState').style.display='block';return;}
  document.getElementById('emptyState').style.display='none';
  document.getElementById('tableHead').innerHTML='<tr><th>#</th><th>Player</th><th>Pos</th><th>School</th><th>Conf</th><th>Age</th><th>Markers</th><th>Grade</th><th>PFF</th><th>Wt</th><th>40-Yd</th><th>WaSS</th><th>Best PPG</th></tr>';
  let html='';
  list.forEach((p,i)=>{
    const col=posColor(p.pos);const idx=PLAYERS.indexOf(p);
    html+='<tr onclick="openModal('+idx+')">';
    html+='<td style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;color:var(--muted);font-weight:700">'+(i+1)+'</td>';
    html+='<td style="font-weight:600">'+p.name+'</td>';
    html+='<td style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;font-weight:700;color:'+col+'">'+p.pos+'</td>';
    html+='<td>'+p.school+'</td>';
    html+='<td style="color:var(--muted);font-size:11px">'+p.conf+'</td>';
    html+='<td>'+fmtAge(p.age)+'</td>';
    html+='<td style="font-family:\'IBM Plex Mono\',monospace;font-weight:700;color:'+col+'">'+p.markers+'</td>';
    html+='<td style="font-family:\'IBM Plex Mono\',monospace;font-weight:700;color:'+gradeColor(p.grade)+'">'+(p.grade?fmt(p.grade,1):'—')+'</td>';
    html+='<td>'+(p.pff||'—')+'</td>';
    html+='<td>'+(p.wt?p.wt+' lbs':'—')+'</td>';
    html+='<td>'+(p.dash||'—')+'</td>';
    html+='<td>'+(p.wass?fmt(p.wass,1):'—')+'</td>';
    html+='<td style="color:var(--gold)">'+fmt(p.bestPPG,1)+'</td>';
    html+='</tr>';
  });
  document.getElementById('tableBody').innerHTML=html;
  document.getElementById('resultsCount').textContent=list.length+' player'+(list.length!==1?'s':'')+' shown';
}

function openModal(idx){
  const p=PLAYERS[idx];if(!p)return;
  const col=posColor(p.pos);const mx=POS_MAX[p.pos]||14;const mk=p.markers||0;
  const src=hshotSrc(p);
  const markers=evalMarkers(p);
  const list=getFiltered();
  const rl=rankLabel(p,list);

  // Marker checklist with actual values
  let checkHtml='<div class="marker-checklist">';
  markers.forEach(m=>{
    const val=markerValue(p,m.label);
    checkHtml+='<div class="marker-item '+(m.hit?'hit':'miss')+'">';
    checkHtml+='<div class="marker-icon">'+(m.hit?'✓':'✗')+'</div>';
    checkHtml+='<div style="flex:1;min-width:0"><div class="marker-text">'+m.label+'</div>';
    checkHtml+='<div style="font-family:\'IBM Plex Mono\',monospace;font-size:11px;font-weight:700;color:'+(m.hit?col:'var(--muted)')+';margin-top:2px">'+val+'</div></div>';
    checkHtml+='</div>';
  });
  checkHtml+='</div>';

  // Circular modal headshot
  const avatarHtml=
    '<div style="display:flex;align-items:center;gap:20px;padding:24px 28px;border-bottom:1px solid var(--border)">'+
      '<div style="width:90px;height:90px;border-radius:50%;overflow:hidden;flex-shrink:0;border:3px solid '+col+';background:var(--surface2)">'+
        (src?'<img src="'+src+'" alt="'+p.name+'" style="width:100%;height:100%;object-fit:cover;object-position:center 20%" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">':'')+
        '<div style="'+(src?'display:none':'')+'width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:\'Bebas Neue\',cursive;font-size:28px;color:var(--muted)">'+p.pos+'</div>'+
      '</div>'+
      '<div>'+
        '<div class="modal-pos-badge bg-'+p.pos.toLowerCase()+'" style="margin-bottom:6px">'+p.pos+' · '+rl+'</div>'+
        '<div class="modal-name" style="font-size:34px">'+p.name+'</div>'+
        '<div class="modal-school" style="color:var(--muted);font-size:13px">'+p.school+' · '+p.conf+(p.age?' · Age '+fmtAge(p.age):'')+'</div>'+
      '</div>'+
    '</div>';

  document.getElementById('modalContent').innerHTML=
    avatarHtml+
    '<div class="modal-grade-row">'+
      '<div class="modal-grade-item"><div class="val" style="color:'+gradeColor(p.grade)+'">'+(p.grade?fmt(p.grade,1):'—')+'</div><div class="lbl">Final Grade</div></div>'+
      '<div class="modal-grade-item"><div class="val" style="color:'+col+'">'+mk+'/'+mx+'</div><div class="lbl">Markers Hit</div></div>'+
      '<div class="modal-grade-item"><div class="val c-gold">'+(p.pff||'—')+'</div><div class="lbl">PFF Markers</div></div>'+
      '<div class="modal-grade-item"><div class="val">'+(p.round?'Rd '+p.round:'—')+'</div><div class="lbl">Draft Round</div></div>'+
    '</div>'+
    '<div class="modal-body">'+
      '<div class="modal-section"><div class="modal-section-title">Marker System — '+mx+' Total ('+mk+' Hit)</div>'+checkHtml+'</div>'+
      '<div class="modal-section"><div class="modal-section-title">Key Production Stats</div><div class="modal-stats-grid">'+posStats(p,col)+'</div></div>'+
      '<div class="modal-section"><div class="modal-section-title">Athleticism & Combine</div>'+
        '<div class="modal-stats-grid">'+
          statSquare(p.ht?Math.floor(p.ht/12)+"'"+(p.ht%12)+'"':'—','Height')+ 
          statSquare(p.wt?p.wt+' lbs':'—','Weight')+
          statSquare(p.dash?p.dash+'s':'—','40-Yard Dash', p.dash&&p.dash<=4.4?'var(--green)':null)+
          statSquare(p.wass?fmt(p.wass,1):'—','Speed Score', p.wass&&p.wass>=100?'var(--green)':null)+
          statSquare(p.burst?fmt(p.burst,1):'—','Burst Score', p.burst&&p.burst>=120?'var(--green)':null)+
          statSquare(p.bmi?fmt(p.bmi,2):'—','BMI')+
        '</div>'+
      '</div>'+
    '</div>';

  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal(){document.getElementById('modalOverlay').classList.remove('open');}
function render(){
  if(viewMode==='cards'){
    renderCards();
    document.getElementById('cardsContainer').style.display='grid';
    document.getElementById('tableContainer').style.display='none';
  } else {
    renderTable();
    document.getElementById('cardsContainer').style.display='none';
    document.getElementById('tableContainer').style.display='block';
  }
}

document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');currentPos=btn.dataset.pos;render();
  });
});
document.getElementById('searchBox').addEventListener('input',e=>{searchQuery=e.target.value.trim();render();});
document.getElementById('sortSelect').addEventListener('change',e=>{currentSort=e.target.value;render();});
document.getElementById('cardViewBtn').addEventListener('click',()=>{viewMode='cards';document.getElementById('cardViewBtn').classList.add('active');document.getElementById('tableViewBtn').classList.remove('active');render();});
document.getElementById('tableViewBtn').addEventListener('click',()=>{viewMode='table';document.getElementById('tableViewBtn').classList.add('active');document.getElementById('cardViewBtn').classList.remove('active');render();});
document.getElementById('modalOverlay').addEventListener('click',e=>{if(e.target===document.getElementById('modalOverlay'))closeModal();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();});

renderHeroStats();render();
</script>
