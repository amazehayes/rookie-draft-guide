<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 Rookie Draft Guide — The Marker System</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c0f;--surface:#111418;--surface2:#181c22;--border:#1e2530;
  --text:#e8edf3;--muted:#5a6478;
  --accent:#00c2ff;--accent2:#f5c842;--accent3:#00c2ff;
  --green:#00e88a;--red:#ff4655;--orange:#ff8c42;--purple:#7b61ff;
  --pos-qb:#7b61ff;--pos-rb:#00e88a;--pos-wr:#00c2ff;--pos-te:#ff8c42;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;min-height:100vh;overflow-x:hidden;}
/* HEADER */
header{position:sticky;top:0;z-index:100;background:rgba(13,15,20,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:60px;}
.logo-title{font-family:'Bebas Neue',cursive;font-size:28px;letter-spacing:2px;color:var(--accent);line-height:1;}
.logo-sub{font-size:9px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-top:2px;}
.year-badge{font-family:'Bebas Neue',cursive;font-size:22px;color:var(--accent2);letter-spacing:2px;}
/* HERO */
.hero{position:relative;padding:60px 32px 48px;background:linear-gradient(180deg,rgba(0,194,255,.04) 0%,transparent 100%);border-bottom:1px solid var(--border);overflow:hidden;}

.hero-bg-text{position:absolute;right:-10px;top:-30px;font-family:'Bebas Neue',cursive;font-weight:800;font-size:200px;color:rgba(0,194,255,.03);line-height:1;pointer-events:none;user-select:none;letter-spacing:2px;}
.hero h1{font-family:'Bebas Neue',cursive;font-size:clamp(42px,6vw,80px);letter-spacing:4px;line-height:.95;margin-bottom:16px;}
.hero h1 span{color:var(--accent2);}

.hero-desc{font-size:12px;color:var(--muted);max-width:900px;line-height:1.8;margin-bottom:28px;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.stat-row{display:flex;gap:28px;flex-wrap:wrap;}
.stat-pill .val{font-family:'Bebas Neue',cursive;font-size:32px;letter-spacing:2px;line-height:1;}
.stat-pill .lbl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-top:3px;}
.stat-pill .sub{font-size:9px;color:var(--accent);margin-top:2px;letter-spacing:1px;}
/* CONTROLS */
.controls{padding:14px 32px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:90;}
.filter-group{display:flex;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:3px;}
.filter-btn{background:none;border:none;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:5px 12px;border-radius:3px;cursor:pointer;transition:all .15s;}
.filter-btn:hover{color:var(--text);}
.filter-btn.active{color:var(--bg)!important;background:var(--accent);}
.filter-btn.active[data-pos="QB"]{background:var(--pos-qb);}
.filter-btn.active[data-pos="RB"]{background:var(--pos-rb);}
.filter-btn.active[data-pos="WR"]{background:var(--pos-wr);}
.filter-btn.active[data-pos="TE"]{background:var(--pos-te);}
.search-box{flex:1;min-width:160px;background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:11px;padding:7px 12px;outline:none;transition:border-color .15s;}
.search-box:focus{border-color:var(--accent);}
.search-box::placeholder{color:var(--muted);}
.sort-select{background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:'IBM Plex Mono',monospace;font-size:10px;padding:7px 10px;outline:none;cursor:pointer;}
.view-toggle{display:flex;gap:3px;background:var(--bg);border:1px solid var(--border);border-radius:5px;padding:3px;}
.view-btn{background:none;border:none;color:var(--muted);padding:5px 9px;border-radius:3px;cursor:pointer;transition:all .15s;font-size:13px;}
.view-btn.active{background:var(--accent);color:var(--bg);}
/* CARDS */
.main{padding:24px 32px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.player-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;cursor:pointer;transition:all .18s;position:relative;animation:fadeUp .3s ease both;}
.player-card::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--pos-color,var(--accent));opacity:.8;}
.player-card:hover{border-color:var(--pos-color,var(--accent));transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.5),0 0 0 1px var(--pos-color,var(--accent)) inset;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card-body{padding:16px 18px 18px;}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.card-rank{font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
.card-pos-badge{font-size:9px;font-weight:700;letter-spacing:2px;padding:3px 7px;border-radius:3px;text-transform:uppercase;}
.card-name-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.card-avatar{width:56px;height:56px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--pos-color,var(--accent));background:var(--surface2);}
.card-avatar img{width:100%;height:100%;object-fit:cover;object-position:center 20%;}
.card-avatar-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-weight:800;font-size:16px;color:var(--muted);}
.card-name{font-family:'Bebas Neue',cursive;font-size:22px;letter-spacing:1px;line-height:1;margin-bottom:3px;}
.card-school{font-size:10px;color:var(--muted);letter-spacing:.5px;}
.card-school span{color:var(--text);opacity:.4;}
.grade-bar-wrap{margin-bottom:12px;}
.grade-bar-label{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.grade-bar-lbl-text{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);}
.grade-val-row{display:flex;align-items:baseline;gap:6px;}
.grade-val{font-family:'Bebas Neue',cursive;font-size:20px;letter-spacing:1px;line-height:1;}
.grade-letter{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:12px;padding:2px 6px;border-radius:3px;letter-spacing:0;}
.grade-bar-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.grade-bar-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.marker-section{margin-top:11px;}
.marker-section-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:5px;}
.marker-dots{display:flex;gap:3px;flex-wrap:wrap;}
.marker-dot{width:7px;height:7px;border-radius:50%;}
.marker-dot.hit{opacity:.9;}
.marker-dot.miss{background:var(--border)!important;opacity:1;}
.card-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
.metric-item{text-align:center;}
.metric-val{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:700;display:block;margin-bottom:2px;}
.metric-lbl{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
/* TABLE */
.table-avatar{width:36px;height:36px;border-radius:50%;overflow:hidden;flex-shrink:0;border:1.5px solid var(--pos-color,var(--accent));background:var(--surface2);display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;margin-right:10px;}
.table-avatar img{width:100%;height:100%;object-fit:cover;object-position:center 20%;}
.table-avatar-fallback{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;color:var(--muted);}
.table-name-cell{display:flex;align-items:center;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;}
thead th:hover{color:var(--accent);}
tbody tr{border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer;}
tbody tr:last-child{border-bottom:none;}
tbody tr:hover{background:var(--surface2);}
td{padding:10px 14px;white-space:nowrap;}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;width:100%;max-width:740px;max-height:92vh;overflow-y:auto;transform:scale(.96);transition:transform .2s;position:relative;}
.modal-overlay.open .modal{transform:scale(1);}
.modal-header{display:flex;align-items:center;gap:18px;padding:22px 26px;border-bottom:1px solid var(--border);position:relative;}
.modal-header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--pos-color,var(--accent)),transparent);}
.modal-avatar{width:80px;height:80px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid var(--pos-color,var(--accent));background:var(--surface2);}
.modal-avatar img{width:100%;height:100%;object-fit:cover;object-position:center 20%;}
.modal-avatar-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-weight:800;font-size:24px;color:var(--muted);}
.modal-pos-badge{font-size:9px;font-weight:700;letter-spacing:2px;padding:3px 8px;border-radius:3px;display:inline-block;margin-bottom:7px;text-transform:uppercase;}
.modal-name{font-family:'Bebas Neue',cursive;font-size:36px;letter-spacing:2px;line-height:1;margin-bottom:4px;}
.modal-school{font-size:13px;color:var(--muted);}
.close-btn{position:absolute;top:18px;right:18px;background:var(--surface2);border:1px solid var(--border);border-radius:50%;width:30px;height:30px;color:var(--muted);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.close-btn:hover{color:var(--text);border-color:var(--text);}
.modal-grade-row{display:flex;gap:0;border-bottom:1px solid var(--border);}
.modal-grade-item{flex:1;padding:14px 18px;border-right:1px solid var(--border);text-align:center;}
.modal-grade-item:last-child{border-right:none;}
.modal-grade-item .val{font-family:'IBM Plex Mono',monospace;font-size:22px;font-weight:700;line-height:1;}
.modal-grade-item .lbl{font-size:8px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-top:3px;}
.modal-body{padding:18px 26px 26px;}
.modal-section{margin-bottom:22px;}
.modal-section-title{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:10px;padding-bottom:7px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.modal-section-title::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--accent);display:inline-block;}
.modal-stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;}
.modal-stat-item{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:9px 11px;}
.modal-stat-val{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:13px;margin-bottom:3px;}
.modal-stat-lbl{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);}
/* MARKER CHECKLIST */
.marker-checklist{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.marker-item{display:flex;align-items:flex-start;gap:7px;padding:7px 9px;border-radius:5px;background:var(--bg);border:1px solid var(--border);}
.marker-item.hit{border-color:rgba(61,255,160,.2);background:rgba(61,255,160,.03);}
.marker-icon{font-size:11px;flex-shrink:0;width:16px;text-align:center;margin-top:1px;}
.marker-text{font-size:9px;color:var(--muted);line-height:1.4;letter-spacing:.3px;}
.marker-item.hit .marker-text{color:rgba(240,237,230,.6);}
.marker-actual{font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;margin-top:2px;}
/* UTILS */
.school-logo{width:28px;height:28px;object-fit:contain;flex-shrink:0;opacity:.9;}
.school-logo-sm{width:20px;height:20px;object-fit:contain;opacity:.85;vertical-align:middle;margin-right:4px;}
.school-logo-modal{width:40px;height:40px;object-fit:contain;opacity:.9;flex-shrink:0;}
.player-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:8px;border:1px solid;}
.player-tag .tag-icon{font-size:10px;}
.empty-state{text-align:center;padding:80px 24px;color:var(--muted);font-size:12px;}
.c-accent{color:var(--accent);}.c-accent2{color:var(--accent2);}.c-accent3{color:var(--accent3);}
.c-green{color:var(--green);}.c-red{color:var(--red);}.c-purple{color:var(--purple);}
.bg-qb{background:color-mix(in srgb,var(--pos-qb) 15%,transparent);color:var(--pos-qb);border:1px solid color-mix(in srgb,var(--pos-qb) 30%,transparent);}
.bg-rb{background:color-mix(in srgb,var(--pos-rb) 15%,transparent);color:var(--pos-rb);border:1px solid color-mix(in srgb,var(--pos-rb) 30%,transparent);}
.bg-wr{background:color-mix(in srgb,var(--pos-wr) 15%,transparent);color:var(--pos-wr);border:1px solid color-mix(in srgb,var(--pos-wr) 30%,transparent);}
.bg-te{background:color-mix(in srgb,var(--pos-te) 15%,transparent);color:var(--pos-te);border:1px solid color-mix(in srgb,var(--pos-te) 30%,transparent);}
.year-tabs{display:flex;gap:3px;align-items:center;overflow-x:auto;max-width:70vw;}
.year-tab{background:none;border:none;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:700;padding:5px 10px;border-radius:4px;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:1px;}
.year-tab:hover{color:var(--text);}
.year-tab.active{background:var(--accent);color:var(--bg);}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--muted);}
@media(max-width:640px){header,.controls,.main{padding-left:16px;padding-right:16px;}.hero{padding:36px 16px 28px;}.cards-grid{grid-template-columns:1fr;}.modal-body{padding:16px;}.modal-name{font-size:24px;}.marker-checklist{grid-template-columns:1fr;}.modal-grade-row{flex-wrap:wrap;}.modal-grade-item{min-width:50%;}}
</style>
</head>

</div>
<div class="controls">

  <select class="sort-select" id="sortSelect">

    <option value="markers">Markers</option>

    <option value="age">Age (Youngest)</option>
    <option value="name">Name A–Z</option>

  <div class="view-toggle">
    <button class="view-btn active" id="cardViewBtn" title="Cards">▦</button>
    <button class="view-btn" id="tableViewBtn" title="Table">☰</button>
  </div>
</div>
<div class="main">
  <div class="results-meta" id="resultsCount"></div>
  <div id="cardsContainer" class="cards-grid"></div>
  <div id="tableContainer" style="display:none"><div class="table-wrap"><table><thead id="tableHead"></thead><tbody id="tableBody"></tbody></table></div></div>
  <div class="empty-state" id="emptyState" style="display:none">No players match your filters.</div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

// ---- HELPERS ----
function posColor(pos){return POS_COLORS[pos]||'#e8ff47';}
function fmt(v,d=1){if(v==null||isNaN(v))return'—';return parseFloat(v).toFixed(d);}
function fmtPct(v){if(v==null||isNaN(v))return'—';return(v*100).toFixed(1)+'%';}
function fmtAge(v){if(!v||isNaN(v))return'—';const yr=Math.floor(v);const mo=Math.round((v-yr)*12);return yr+'y '+mo+'m';}
const LOGO_BASE='logos/';
function hshotSrc(p){
  if(p.cfr_id) return HEADSHOT_BASE+p.cfr_id+'.jpeg';
  if(p.pfr_id) return HEADSHOT_BASE+p.pfr_id+'.jpeg';
  return null;
}
function logoSrc(school){
  if(!school)return null;
  // Special cases
  const special={'Miami (FL)':'Miami_Fl_','Texas A&M':'Texas_A_M','North Carolina A&T':'North_Carolina_A_T','East Central  OK ':'East_Central__OK_'};
  if(special[school])return LOGO_BASE+special[school]+'.png';
  // General rule: spaces -> underscores, strip ()&
  let name=school.replace(/ /g,'_').replace(/[()&]/g,'').replace(/__+/g,'_').replace(/_$/g,'');
  return LOGO_BASE+name+'.png';
}

function letterGrade(g){
  if(g==null)return{l:'—',c:'var(--muted)'};
  if(g>=97)return{l:'A+',c:'#3dffa0'};
  if(g>=93)return{l:'A', c:'#3dffa0'};
  if(g>=90)return{l:'A-',c:'#3dffa0'};
  if(g>=87)return{l:'B+',c:'#e8ff47'};
  if(g>=83)return{l:'B', c:'#e8ff47'};
  if(g>=80)return{l:'B-',c:'#e8ff47'};
  if(g>=77)return{l:'C+',c:'#ffaa30'};
  if(g>=73)return{l:'C', c:'#ffaa30'};
  if(g>=70)return{l:'C-',c:'#ffaa30'};
  if(g>=67)return{l:'D+',c:'#ff6b35'};
  if(g>=63)return{l:'D', c:'#ff6b35'};
  if(g>=60)return{l:'D-',c:'#ff6b35'};
  return{l:'F',c:'#ff4f6b'};
}

function gradeColor(g){
  if(!g)return'var(--muted)';
  if(g>=80)return'var(--green)';
  if(g>=65)return'var(--accent)';
  if(g>=50)return'var(--orange)';
  return'var(--red)';
}

// ---- TAG EVALUATION ----
function getTag(p) {
  const pos=p.pos, round=p.round, markers=p.markers||0, pff=p.pff||0, grade=p.grade||0;

  if(pos==='QB'){
    const hasVolume = (p.careerPA>=900 && p.careerPAPG>=28 && p.years!=null && p.years<6) ||
                      (p.careerPYd>=8500 && p.careerYPG>=225 && p.years!=null && p.years<6);
    const lackVolume = (p.careerPA<900 || (p.careerPAPG<28 && p.years!=null && p.years<6)) ||
                       (p.careerPYd<8500 || (p.careerYPG<225 && p.years!=null && p.years<6));
    const runs = p.careerRuYd!=null && p.careerRuYd>=1000;
    if(pff>=6 && round===1 && hasVolume)
      return {label:'Greatest Prospect Since...', color:'#16A34A', icon:'🏆'};
    if(((pff<6 && runs && round===1)) || (pff>=6 && runs && round===1 && lackVolume))
      return {label:'Iffy, But He Runs', color:'#F59E0B', icon:'🏃'};
    if(((pff<6 && !runs && round===1)) || (pff>=6 && round===1 && lackVolume))
      return {label:'N.F.L. = Not For Long', color:'#DC2626', icon:'⚠️'};
    return null;
  }

  if(pos==='RB'){
    if(markers>=7 && round!=null && round<6 && round>3)
      return {label:'Late-Round Target', color:'#1687A3', icon:'🎯'};
    if(markers>=3 && p.careerBA!=null && p.careerBA>=0.09 &&
       p.careerYACO!=null && p.careerYACO>3.75 &&
       p.bestYPRR!=null && p.bestYPRR>1.5 &&
       p.best1D!=null && p.best1D>0.3)
      return {label:'Fine, I\'ll Do It Myself', color:'#16A34A', icon:'💪'};
    if(p.careerMTF!=null && p.careerMTF>=0.35 && round!==8)
      return {label:'Try To Tackle Me', color:'#16A34A', icon:'⚡'};
    return null;
  }

  if(pos==='WR'){
    if(pff>=11 && pff>(markers*2) && round!=null && round<=5)
      return {label:'The McConkey List', color:'#16A34A', icon:'🏆'};
    if((pff*2)<=markers && round!=null && round<=2 && markers>3)
      return {label:"The N'Keal List", color:'#DC2626', icon:'⚠️'};
    if(p.firstYPTPA!=null && p.firstYPTPA===p.bestYPTPA &&
       p.firstMSYards!=null && p.firstMSYards===p.bestMSYards &&
       p.firstPPG!=null && p.firstPPG===p.bestPPG && round!=null && round<=3)
      return {label:'Phreshman Phenom', color:'#DC2626', icon:'⚠️'};
    if(round!=null && round<=3 && p.careerYPRRzone!=null && p.careerYPRRzone>=3)
      return {label:'Zone Crusher', color:'#16A34A', icon:'💥'};
    if(round!=null && round<=3 && p.careerYPRRzone!=null && p.careerYPRRzone<2.25)
      return {label:'Crushed by Zone', color:'#DC2626', icon:'🔒'};
    return null;
  }

  if(pos==='TE'){
    if(pff>7 && (markers>=10 || grade>=85))
      return {label:'The Bowers List', color:'#1687A3', icon:'🏆'};
    if(markers>=10 || grade>=85)
      return {label:'Analytical Darling', color:'#16A34A', icon:'⭐'};
    if(pff>7 && (round==null || round<=5))
      return {label:'You Have My Attention', color:'#16A34A', icon:'✏️'};
    return null;
  }
  return null;
}

function tagHTML(p){
  const t=getTag(p);
  if(!t)return'';
  return '<div class="player-tag" style="color:'+t.color+';background:'+t.color+'18;border-color:'+t.color+'44">'+
    '<span class="tag-icon">'+t.icon+'</span>'+t.label+'</div>';
}

// ---- DYNASTY SORT ----
function dynastySort(p){
  const pos=p.pos,round=p.round,overall=p.overall,grade=p.grade||0;
  if(round===8)                                            return grade*0.5;
  if(pos==='QB'&&round===1)                                return grade*1.05;
  if(pos==='QB'&&round>1)                                  return grade*0.85;
  if(pos==='TE'&&overall!=null&&overall<=15)               return grade*0.97;
  if(pos==='TE'&&overall!=null&&overall>15&&round!=null&&round<=2) return grade*0.9;
  if(pos==='TE'&&round===3)                                return grade*0.85;
  if(pos==='WR'&&overall!=null&&overall<=10)               return grade*1.05;
  if(pos==='WR'&&round===3)                                return grade*0.9;
  if((pos==='RB'&&round!=null&&round>4)||((pos==='WR'||pos==='TE')&&round!=null&&round>3)) return grade*0.85;
  return grade;
}

    r.push({label:'Last YPTPA ≥ 2.5',              hit:p.lastYPTPA!=null&&p.lastYPTPA>=2.5,       val:fmt(p.lastYPTPA,1)});
    r.push({label:'Best YPTPA ≥ 2.85',             hit:p.bestYPTPA!=null&&p.bestYPTPA>=2.85,      val:fmt(p.bestYPTPA,1)});
    r.push({label:'Best MS Yards ≥ 35%',           hit:p.bestMSYards!=null&&p.bestMSYards>=0.35,  val:p.bestMSYards!=null?(p.bestMSYards*100).toFixed(1)+'%':'—'});
    r.push({label:'Last PPG ≥ 20',                 hit:p.lastPPG!=null&&p.lastPPG>=20,            val:fmt(p.lastPPG,1)+' PPG'});
    r.push({label:'Best PPG ≥ 20',                 hit:p.bestPPG!=null&&p.bestPPG>=20,            val:fmt(p.bestPPG,1)+' PPG'});
    r.push({label:'BMI ≥ 27',                      hit:p.bmi!=null&&p.bmi>=27,                    val:fmt(p.bmi,2)});
    r.push({label:'Height ≥ 6\'0"',               hit:p.ht!=null&&p.ht>=72,                      val:p.ht!=null?Math.floor(p.ht/12)+"'"+(p.ht%12)+'"':'—'});
    r.push({label:'40-Yard Dash ≤ 4.55s',          hit:p.dash!=null&&p.dash<=4.55,                val:p.dash!=null?p.dash+'s':'—'});
    r.push({label:'Speed Score ≥ 100',             hit:p.wass!=null&&p.wass>=100,                 val:fmt(p.wass,1)});
    r.push({label:'Burst Score ≥ 120',             hit:p.burst!=null&&p.burst>=120,               val:fmt(p.burst,1)});
  } else {
    r.push({label:'Round ≤ 3',                     hit:p.round!=null&&p.round<=3,                 val:p.round!=null?'Rd '+p.round:'—'});
    r.push({label:'Breakout Age (15%) ≤ Yr 2',     hit:p.boy15!=null&&p.boy15<=2,                 val:p.boy15!=null?'Yr '+p.boy15:'—'});
    r.push({label:'Breakout Age (20%) ≤ Yr 3',     hit:p.boy20!=null&&p.boy20<=3,                 val:p.boy20!=null?'Yr '+p.boy20:'—'});

    r.push({label:'Last YPTPA ≥ 1.5',              hit:p.lastYPTPA!=null&&p.lastYPTPA>=1.5,       val:fmt(p.lastYPTPA,1)});
    r.push({label:'Best YPTPA ≥ 1.75',             hit:p.bestYPTPA!=null&&p.bestYPTPA>=1.75,      val:fmt(p.bestYPTPA,1)});
    r.push({label:'Best MS Yards ≥ 20%',           hit:p.bestMSYards!=null&&p.bestMSYards>=0.20,  val:p.bestMSYards!=null?(p.bestMSYards*100).toFixed(1)+'%':'—'});
    r.push({label:'Last PPG ≥ 11',                 hit:p.lastPPG!=null&&p.lastPPG>=11,            val:fmt(p.lastPPG,1)+' PPG'});
    r.push({label:'Best PPG ≥ 13',                 hit:p.bestPPG!=null&&p.bestPPG>=13,            val:fmt(p.bestPPG,1)+' PPG'});
    r.push({label:'Weight ≥ 250 lbs',              hit:p.wt!=null&&p.wt>=250,                     val:p.wt!=null?p.wt+' lbs':'—'});
    r.push({label:'Height ≥ 6\'4"',               hit:p.ht!=null&&p.ht>=76,                      val:p.ht!=null?Math.floor(p.ht/12)+"'"+(p.ht%12)+'"':'—'});
    r.push({label:'40-Yard Dash ≤ 4.7s',           hit:p.dash!=null&&p.dash<=4.7,                 val:p.dash!=null?p.dash+'s':'—'});
    r.push({label:'Speed Score ≥ 100',             hit:p.wass!=null&&p.wass>=100,                 val:fmt(p.wass,1)});
    r.push({label:'Burst Score ≥ 120',             hit:p.burst!=null&&p.burst>=120,               val:fmt(p.burst,1)});
  }
  return r;
}

function statSq(val,lbl,col){
  return '<div class="modal-stat-item"><div class="modal-stat-val"'+(col?' style="color:'+col+'"':'')+'>'+val+'</div><div class="modal-stat-lbl">'+lbl+'</div></div>';
}

function pffStats(p,col){
  if(p.pos==='QB') return[
    statSq(fmtPct(p.careerAcc),'Career True Acc%',col),
    statSq(fmtPct(p.careerBTT),'Career Big Time Throw%',col),
    statSq(fmtPct(p.careerTWP),'Career TWP%'),
    statSq(fmtPct(p.careerSackPct),'Career Sack%'),
    statSq(fmtPct(p.bestAcc),'Best True Acc%',col),
    statSq(fmtPct(p.bestBTT),'Best Big Time Throw%',col),
    statSq(fmtPct(p.bestTWP),'Best TWP%'),
    statSq(fmtPct(p.bestSackPct),'Best Sack%'),
  ].join('');
  if(p.pos==='RB') return[
    statSq(fmt(p.careerBA,1),'Career Broken Tkls/Att',col),
    statSq(fmt(p.careerMTF,1),'Career Miss Tkls Forced/Att',col),
    statSq(fmt(p.career1D,1),'Career 1st Downs/Att'),
    statSq(fmt(p.careerYACO,1),'Career YACO/Att'),
    statSq(fmt(p.careerYPRR,1),'Career Yds/Route Run',col),
    statSq(fmt(p.careerTPRR,1),'Career Tgts/Route Run'),
    statSq(fmt(p.bestBA,1),'Best Broken Tkls/Att',col),
    statSq(fmt(p.bestMTF,1),'Best Miss Tkls Forced/Att',col),
    statSq(fmt(p.bestYACO,1),'Best YACO/Att'),
    statSq(fmt(p.bestYPRR,1),'Best Yds/Route Run',col),
  ].join('');
  if(p.pos==='WR') return[
    statSq(fmt(p.careerYPRR,1),'Career Yds/Route Run',col),
    statSq(fmt(p.careerTPRR,1),'Career Tgts/Route Run'),
    statSq(fmt(p.career1DRR,1),'Career 1st Downs/Route'),
    statSq(fmt(p.careerYACR,1),'Career YAC/Route'),
    statSq(fmt(p.careerMTF,2),'Career Miss Tkls Forced',col),
    statSq(fmtPct(p.careerSlot),'Career Slot Rate'),
    statSq(fmt(p.bestYPRR,1),'Best Yds/Route Run',col),
    statSq(fmt(p.bestTPRR,1),'Best Tgts/Route Run'),
  ].join('');
  // TE
  return[
    statSq(fmt(p.careerYPRR,1),'Career Yds/Route Run',col),
    statSq(fmt(p.careerTPRR,1),'Career Tgts/Route Run'),
    statSq(fmt(p.career1DRR,1),'Career 1st Downs/Route'),
    statSq(fmt(p.careerYACR,1),'Career YAC/Route'),
    statSq(fmt(p.careerMTF,2),'Career Miss Tkls Forced',col),
    statSq(fmtPct(p.careerSlot),'Career Slot Rate'),
    statSq(fmt(p.avgPassBlock,1),'Avg Pass Block Grade',col),
    statSq(fmt(p.avgRunBlock,1),'Avg Run Block Grade'),
    statSq(fmt(p.bestYPRR,1),'Best Yds/Route Run',col),
  ].join('');
}

function cardMetrics(p){
  if(p.pos==='QB')return[{v:p.careerCMP?fmtPct(p.careerCMP):'—',l:'Career CMP%'},{v:fmt(p.careerYPA,1),l:'Career YPA'},{v:fmt(p.bestPPG,1),l:'Best PPG'}];
  if(p.pos==='RB')return[{v:fmt(p.yptp,1),l:'YPTP'},{v:p.bestRec!=null?p.bestRec:'—',l:'Best Rec'},{v:fmt(p.bestPPG,1),l:'Best PPG'}];
  if(p.pos==='WR')return[{v:p.boy30!=null?'Yr '+fmt(p.boy30,0):'—',l:'Breakout Yr 30%'},{v:p.bestYPTPA?fmt(p.bestYPTPA,1):'—',l:'Best YPTPA'},{v:fmt(p.bestPPG,1),l:'Best PPG'}];
  return[{v:p.boa20!=null?fmt(p.boa20,1)+'y':'—',l:'Breakout Age 20%'},{v:p.bestYPTPA?fmt(p.bestYPTPA,1):'—',l:'Best YPTPA'},{v:fmt(p.bestPPG,1),l:'Best PPG'}];
}

      '</div>'+

        '<div class="modal-stats-grid">'+
          statSq(p.ht!=null?Math.floor(p.ht/12)+"'"+(p.ht%12)+'"':'—','Height')+

function buildYearTabs() {
  const container = document.getElementById('yearTabs');
  YEARS.forEach(yr => {
    const btn = document.createElement('button');
    btn.className = 'year-tab' + (yr === 2026 ? ' active' : '');
    btn.textContent = yr;
    btn.addEventListener('click', () => switchYear(yr));
    container.appendChild(btn);
  });
}

async function switchYear(yr) {
  if(yr === activeYear) return;
  activeYear = yr;

  // Update tab UI
  document.querySelectorAll('.year-tab').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === yr);
  });

  // Update hero title
  document.getElementById('heroTitle').innerHTML = yr + ' <span>ROOKIE DRAFT CLASS</span>';

  // Reset filters
  currentPos = 'ALL'; currentSort = 'rank'; searchQuery = ''; currentLabel = 'ALL'; currentSchool = 'ALL';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.pos === 'ALL'));
  document.getElementById('searchBox').value = '';
  document.getElementById('sortSelect').value = 'rank';
  document.getElementById('labelFilter').value = 'ALL';
  document.getElementById('schoolFilter').value = 'ALL';

  // Load data if not cached
  if(!yearCache[yr]) {
    document.getElementById('resultsCount').textContent = 'Loading ' + yr + ' class...';
    try {
      const res = await fetch('data/' + yr + '.json');
      yearCache[yr] = await res.json();
    } catch(e) {
      document.getElementById('resultsCount').textContent = 'Error loading ' + yr + ' data.';
      return;
    }
  }

  // Repopulate school dropdown for this year
  const schools = [...new Set(yearCache[yr].map(p=>p.school).filter(Boolean))].sort();
  const sel = document.getElementById('schoolFilter');
  sel.innerHTML = '<option value="ALL">All Schools</option>';
  schools.forEach(s => { const o = document.createElement('option'); o.value = s; o.textContent = s; sel.appendChild(o); });

  renderHeroStats();
  render();
}

// Override getFiltered to use activeYear data
const _origGetFiltered = getFiltered;
function getFiltered() {
  const data = yearCache[activeYear] || PLAYERS;
  return data.filter(p => {
    if(currentPos !== 'ALL' && p.pos !== currentPos) return false;
    if(currentSchool !== 'ALL' && p.school !== currentSchool) return false;
    if(searchQuery) { const q = searchQuery.toLowerCase(); if(!p.name.toLowerCase().includes(q)) return false; }
    if(currentLabel !== 'ALL') {
      const t = getTag(p);
      if(currentLabel === '_ANY') { if(!t) return false; }
      else { if(!t || t.label !== currentLabel) return false; }
    }
    return true;
  }).sort((a,b) => {
    switch(currentSort) {
      case 'grade':   return (b.grade||0)-(a.grade||0);
      case 'markers': return (b.markers||0)-(a.markers||0);
      case 'age':     return (a.age||99)-(b.age||99);
      case 'name':    return a.name.localeCompare(b.name);
      case 'draft': {
        const ao = a.overall!=null?a.overall:9999;
        const bo = b.overall!=null?b.overall:9999;
        return ao-bo;
      }
      default: return dynastySort(b)-dynastySort(a);
    }
  });
}

// Override renderHeroStats to use activeYear data
function renderHeroStats() {
  const data = yearCache[activeYear] || PLAYERS;
  const byPos = {};
  data.forEach(p => { byPos[p.pos] = (byPos[p.pos]||0)+1; });
  const grades = data.filter(p=>p.grade).map(p=>p.grade);
  const avg = grades.length ? grades.reduce((s,g)=>s+g,0)/grades.length : 0;

  // Class rank among all years
  const allAvgs = Object.entries(ALL_CLASS_AVGS).sort((a,b)=>b[1]-a[1]);
  const classRank = allAvgs.findIndex(([y])=>parseInt(y)===activeYear)+1;
  const totalYears = allAvgs.length;

  document.getElementById('heroStats').innerHTML =
    '<div class="stat-pill"><div class="val c-accent">'+data.length+'</div><div class="lbl">Players</div></div>'+
    '<div class="stat-pill"><div class="val" style="color:var(--pos-qb)">'+(byPos.QB||0)+'</div><div class="lbl">QBs</div></div>'+
    '<div class="stat-pill"><div class="val" style="color:var(--pos-rb)">'+(byPos.RB||0)+'</div><div class="lbl">RBs</div></div>'+
    '<div class="stat-pill"><div class="val" style="color:var(--pos-wr)">'+(byPos.WR||0)+'</div><div class="lbl">WRs</div></div>'+
    '<div class="stat-pill"><div class="val" style="color:var(--pos-te)">'+(byPos.TE||0)+'</div><div class="lbl">TEs</div></div>'+
    '<div class="stat-pill"><div class="val c-accent2">'+fmt(avg,1)+'</div><div class="lbl">Avg Grade</div>'+
    '<div class="sub">#'+classRank+' of '+totalYears+' classes (2005–2026)</div></div>';
}

buildYearTabs();
renderHeroStats();
render();
</script>
